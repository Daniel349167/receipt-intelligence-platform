name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json
      - run: npm ci
      - run: npm audit --omit=dev --audit-level=high
      - run: npm run build

  end-to-end:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: apps/orchestrator/requirements-test.txt
      - run: pip install -r apps/orchestrator/requirements-test.txt
      - run: docker compose -f infra/docker-compose.yml up -d --build db agent-analyzer orchestrator
      - name: Wait for API
        run: |
          for attempt in {1..40}; do
            curl --fail --silent http://localhost:8000/health && exit 0
            sleep 3
          done
          docker compose -f infra/docker-compose.yml logs
          exit 1
      - run: pytest apps/orchestrator/tests/e2e
      - if: always()
        run: docker compose -f infra/docker-compose.yml down -v
